# OPTIONS

set -g mouse on
set -g status-keys vi
set -g base-index 1
set -g pane-base-index 1
set-window-option -g mode-keys vi
set -as terminal-features ",*:hyperlinks"

# KEYBINDS
unbind C-b
unbind %
unbind '"'
unbind '#'
unbind ,
unbind -n C-j
unbind -n C-k
unbind =
unbind C-o
unbind E
unbind M-o
unbind c

# prefix
set-option -g prefix C-a
bind-key C-a send-prefix

# reload config
bind M-r source-file "~/.config/tmux/tmux.conf" \; display "Reloaded!"

# navigation
bind -T copy-mode-vi K send -X top-line
bind -T copy-mode-vi J send -X bottom-line
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind-key -T copy-mode-vi m send-keys -X scroll-middle
bind-key -T copy-mode-vi M send-keys -X middle-line
bind-key -T copy-mode-vi C-k send-keys -X page-up
bind-key -T copy-mode-vi C-j send-keys -X page-down

# layout
bind v split-window -hc "#{pane_current_path}"
bind s split-window -vc "#{pane_current_path}"
bind V split-window -h
bind S split-window -v
bind n new-window -c "#{pane_current_path}"
bind N new-window
bind Enter choose-window -Z
bind w display-panes -d 0
bind q confirm-before -p "kill-pane '#P'? (y/n)" kill-pane
bind Q confirm-before -p "kill-window '#W'? (y/n)" kill-window
bind C-q confirm-before -p "kill-session '#S'? (y/n)" kill-session
bind -r C-k select-pane -U
bind -r C-j select-pane -D
bind -r C-h select-pane -L
bind -r C-l select-pane -R
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1
bind = select-layout -E
bind -r ] next-window
bind -r [ previous-window
bind -r h previous-window
bind -r l next-window
bind -r r rotate-window -U
bind -r R rotate-window -D
bind-key '#' command-prompt -p "window name:" "rename-window '%%'"

# copy-mode
bind ' ' copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'M-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection

# pane status
bind m select-pane -m\; setw monitor-activity

# paste buffers
bind '"' choose-buffer

# clock
bind c clock-mode

# STYLE

set -g message-style 'fg=#FFC777 bg=#38343D bold'
set -g pane-active-border-style 'fg=#FFFFFF'
set -g pane-border-style 'fg=#808080'
set -g mode-style 'bg=#2D3F76'
set -g status on
set -g status-justify left
set -g status-left "#[fg=#1B1D2B bg=#C3E88D bold] î¯ˆ #S #[fg=default bg=default]î‚¸"
set -g status-left-length 30
set -g status-position top
set -g status-interval 1
set -g status-right "#[fg=#3B4261 bg=#000000]î‚º#[fg=#82AAFF bg=#3B4261] #(whoami)@#h î‚º#[fg=#1B1D2B bg=#82AAFF] %X %x "
set -g status-right-length 75
set -g status-right-style 'fg=#82AAFF bg=#3B4261'
set -g status-style 'fg=#C3E88D'
set -g window-status-activity-style ''
set -g window-status-current-format '#[fg=#82AAFF bg=#000000]î‚¾#[fg=#1B1D2B bg=#82AAFF bold]#Iâ”‚#W #{?window_marked_flag,ó°‚š ,}#{?window_zoomed_flag,ó°Š“ ,}#[fg=#82AAFF bg=default]î‚¸'
set -g window-status-current-style ''
set -g window-status-format '#[fg=#3B4261 bg=#000000]î‚¾#[bg=#3B4261]#{?window_activity_flag,#[fg=#FFC777 bold blink],#[fg=#82AAFF]}#Iâ”‚#W #{?window_bell_flag,#[bg=#FFC777]ó°‚š#[bg=default] ,}#{?window_silent_flag,ó°Ÿ… ,}#{?window_marked_flag,ó°‚š ,}#{?window_zoomed_flag,ó°Š“ ,}#[fg=#3B4261 bg=default]î‚¸'
set -g window-status-separator ''
set -g window-status-style ''

# PLUGINS

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# options
set -g @resurrect-processes 'nvim'
set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_down "M-j"
set -g @vim_navigator_mapping_prev "M-w"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
